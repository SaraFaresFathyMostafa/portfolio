<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Courses</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
    </header>
    <h2>Add New Course</h2>
    <nav> 
        <a href="../index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-courses.html">Add Courses</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    <main>
        <section>
            <form>
                    <label>Course Name</label>
                    <input type="text" required placeholder="Enter Course Name">
                    <label>Instructor</label>
                    <input type="text" required placeholder="Enter Instructor Name">
                    <label>Credit hours</label>
                    <input type="number" required placeholder="Enter Credit hours">
                    <label>Notes</label>
                    <textarea rows="4" placeholder="Add additional notes"></textarea>
                <button type="submit">Add New Course</button> 
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Personal Organizer by Sara Fares</p>
    </footer>
</body>
</html>
